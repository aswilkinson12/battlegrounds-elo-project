<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Player</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #f6f7fb; color: #111; }
    header { background: white; border-bottom: 1px solid #e6e8f0; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 18px 16px; }
    h1 { margin: 0; font-size: 22px; }
    nav { margin-top: 8px; display: flex; gap: 12px; flex-wrap: wrap; }
    nav a { text-decoration: none; color: #2457ff; font-weight: 600; }
    nav a:hover { text-decoration: underline; }

    .card { background: white; border: 1px solid #e6e8f0; border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,.04); margin-top: 16px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; padding: 14px 16px; align-items: center; justify-content: space-between; }
    .meta { color: #556; font-size: 13px; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #eef2ff; color: #2b3cff; font-size: 12px; font-weight: 700; }
    .error { color: #b00020; padding: 14px 16px; }
    .dropdown { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #eef2ff; color: #1b1b1c; font-size: 14px; font-weight: 500; }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; border-top: 1px solid #eef0f7; font-size: 14px; }
    th { text-align: left; position: sticky; top: 0; background: white; z-index: 1; }
    tr:hover td { background: #fafbff; }
    .num { font-variant-numeric: tabular-nums; }
    .win { color: #0b7a2a; font-weight: 700; }
    .loss { color: #b00020; font-weight: 700; }
    .draw { color: #7a5b00; font-weight: 700; }

    .week-header td{
      background: #f1f3ff;
      font-weight: 800;
      color: #223;
      border-top: 1px solid #e6e8f0;
    }
    .week-footer td{
      background: #fafbff;
      font-weight: 700;
      color: #334;
      border-top: 1px solid #eef0f7;
    }
    .week-meta { font-weight: 600; color: #556; margin-left: 8px; }
    .week-row{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .week-left{ font-weight: 800; color: #223; }
    .week-right{ font-weight: 700; color: #556; margin-left: auto; text-align: right; }
    .week-header .meta {
      font-weight: 600;
      color: #556;
      margin-left: 8px;
    }
    .week-spacer td{
      border: none !important;
      padding: 0 !important;
      height: 12px;
      background: transparent;
    }

    input {
      width: min(420px, 100%); padding: 10px 12px; border-radius: 10px;
      border: 1px solid #d7dbea; background: #fff;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1 id="title">Player</h1>
      <nav>
        <a href="../index.html">Leaderboard</a>
        <a href="player.html">Player Search</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="row">
        <label for="player-search">Player Search:</label>
        <select class="dropdown" name="player-search" id="player-search"></select>
      </div>
    </section>
    <section class="card">
      <div class="row">
        <div>
          <div class="meta">Profile</div>
          <div style="font-size:18px;font-weight:800;" id="playerName">Loading…</div>
        </div>
        <div class="meta">
          <span class="pill" id="eloPill">Rating: —</span>
          <span class="pill" id="recordPill">W-L-D: —</span>
          <span class="pill" id="gamesPill">Matches: —</span>
        </div>
      </div>

      <div id="playerMedia" style="padding: 0 16px 16px 16px;"></div>

      <div class="row" style="border-top:1px solid #eef0f7;">
        <input id="filter" type="search" placeholder="Filter matches (opponent / week)…" autocomplete="off" />
        <div class="meta" id="matchCount">—</div>
      </div>

      <div id="error" class="error" style="display:none;"></div>

      <div style="overflow:auto;">
        <table aria-label="Match history">
          <thead>
            <tr>
              <th>Week</th>
              <th class="num">Round</th>
              <th>Opponent</th>
              <th class="num">Opp Elo</th>
              <th>Result</th>
              <th class="num">Elo Before</th>
              <th class="num">Elo After</th>
              <th class="num">Δ</th>            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

<script>
  // Expect: ../data/players/<slug>.json
  function getSlug() {
    const url = new URL(window.location.href);
    return (url.searchParams.get("p") || "").toLowerCase().trim();
  }

  function safeNum(x, fallback = 0) {
    const n = Number(x);
    return Number.isFinite(n) ? n : fallback;
  }

  function avgOppElo(list) {
    let sum = 0, n = 0;
    for (const m of list) {
      const v = safeNum(m.opp_elo, 1500);
      if (Number.isFinite(v)) { sum += v; n += 1; }
    }
    return n ? (sum / n) : null;
  }

  function recordWLD(list) {
    let w = 0, l = 0, d = 0;
    for (const m of list) {
      const r = String(m.result || "");
      if (r === "W") w += 1;
      else if (r === "L") l += 1;
      else if (r === "D" || r === "ID") d += 1;  // IDs count as draws for record
    }
    return { w, l, d };
  }

  const PLAYERS_INDEX_URL = "../data/players_index.json";

  function showError(msg) {
    const el = document.getElementById("error");
    el.style.display = "block";
    el.textContent = msg;
  }

  async function getPlayersIndex() {
    const url = "../data/players_index.json"
    return await fetch(url);
  }

  const slug = getSlug();
  const select = document.getElementById("player-search");
  const tbody = document.getElementById("tbody");
  const filter = document.getElementById("filter");
  const matchCount = document.getElementById("matchCount");

  let playerData = null;
  function normName(s) {
    return String(s || "").trim().toLowerCase();
  }

  let nameToSlug = new Map(); // normalized name -> slug
  let allMatches = [];

  function render(matches, grouped = true) {
    tbody.innerHTML = "";

    // Helper to append a single match row (your existing row logic)
    function appendMatchRow(m) {
      const tr = document.createElement("tr");

      const tdWeek = document.createElement("td");
      tdWeek.textContent = m.week;
      tr.appendChild(tdWeek);

      const tdRound = document.createElement("td");
      tdRound.className = "num";
      tdRound.textContent = m.round;
      tr.appendChild(tdRound);

      const tdOpp = document.createElement("td");
      tdOpp.textContent = m.opponent;
      tr.appendChild(tdOpp);

      const tdOppElo = document.createElement("td");
      tdOppElo.className = "num";
      tdOppElo.textContent = safeNum(m.opp_elo, 1500).toFixed(2);
      tr.appendChild(tdOppElo);

      const tdRes = document.createElement("td");
      const r = String(m.result || "");
      tdRes.textContent = r;
      if (r === "W") tdRes.className = "win";
      if (r === "L") tdRes.className = "loss";
      if (r === "D" || r === "ID") tdRes.className = "draw";
      tr.appendChild(tdRes);

      const tdPre = document.createElement("td");
      tdPre.className = "num";
      tdPre.textContent = safeNum(m.elo_before).toFixed(2);
      tr.appendChild(tdPre);

      const tdPost = document.createElement("td");
      tdPost.className = "num";
      tdPost.textContent = safeNum(m.elo_after).toFixed(2);
      tr.appendChild(tdPost);

      const tdDelta = document.createElement("td");
      tdDelta.className = "num";
      const d = safeNum(m.elo_after) - safeNum(m.elo_before);
      tdDelta.textContent = (d >= 0 ? "+" : "") + d.toFixed(2);
      tr.appendChild(tdDelta);

      tbody.appendChild(tr);
    }

    // If not grouping, render flat
    if (!grouped) {
      matches.forEach(appendMatchRow);
      matchCount.textContent = `${matches.length} match${matches.length === 1 ? "" : "es"}`;
      return;
    }

    // Group by week
    const byWeek = new Map();
    for (const m of matches) {
      const wk = String(m.week || "Unknown");
      if (!byWeek.has(wk)) byWeek.set(wk, []);
      byWeek.get(wk).push(m);
    }

    // Keep current week order based on matches array (assumes matches is sorted newest week first)
    const weekOrder = [];
    for (const m of matches) {
      const wk = String(m.week || "Unknown");
      if (!weekOrder.includes(wk)) weekOrder.push(wk);
    }

    let totalRows = 0;

    weekOrder.forEach(wk => {
      const list = byWeek.get(wk) || [];
      if (!list.length) return;

      // IMPORTANT: within-week order should be Round 1 -> 5 (top to bottom)
      const listAsc = [...list].sort((a, b) => safeNum(a.round) - safeNum(b.round));

      // Starting Elo = elo_before of the first (Round 1) match
      const startElo = safeNum(listAsc[0].elo_before).toFixed(2);

      // Ending Elo = elo_after of the last (Round 5) match
      const endElo = safeNum(listAsc[listAsc.length - 1].elo_after).toFixed(2);

      // Header row
      const trH = document.createElement("tr");
      trH.className = "week-header";
      const tdH = document.createElement("td");
      tdH.colSpan = 8; // update if you change columns
      tdH.innerHTML = `
        <div class="week-row">
          <span class="week-left">${wk}</span>
          <span class="week-right">Starting Rating: ${startElo}</span>
        </div>
      `;
      trH.appendChild(tdH);
      tbody.appendChild(trH);

      // Match rows (Round 1 -> 5)
      listAsc.forEach(m => {
        appendMatchRow(m);
        totalRows += 1;
      });

      // Footer summary row
      const avgE = avgOppElo(listAsc);
      const rec = recordWLD(listAsc);
      const avgTxt = (avgE === null) ? "Avg Opp Elo: —" : `Avg Opp Elo: ${avgE.toFixed(1)}`;
      const recTxt = `Record: ${rec.w}-${rec.l}-${rec.d}`;

      const trF = document.createElement("tr");
      trF.className = "week-footer";
      const tdF = document.createElement("td");
      tdF.colSpan = 8; // update if you change columns
      tdF.innerHTML = `
        <div class="week-row">
          <span class="week-left">${recTxt}</span>
          <span class="week-right">${avgTxt} · New Rating: ${endElo}</span>
        </div>
      `;
      trF.appendChild(tdF);
      tbody.appendChild(trF);
      const trS = document.createElement("tr");
      trS.className = "week-spacer";
      const tdS = document.createElement("td");
      tdS.colSpan = 8; // match your table column count
      trS.appendChild(tdS);
      tbody.appendChild(trS);
    });

    matchCount.textContent = `${totalRows} match${totalRows === 1 ? "" : "es"}`;
  }

  function applyFilter() {
    const q = filter.value.trim().toLowerCase();
    if (!q) {
      // no filter -> grouped
      render(allMatches, true);
      return;
    }
    const f = allMatches.filter(m =>
      String(m.opponent).toLowerCase().includes(q) ||
      String(m.week).toLowerCase().includes(q)
    );
    // filter -> flat list
    render(f, false);
  }

  filter.addEventListener("input", applyFilter);

  async function loadPlayersIndex() {
    let playerList = await getPlayersIndex();
    if (!playerList.ok) throw new Error(`HTTP ${playerList.status}`);
    playerList = await playerList.json();

    if (slug == "" || !playerList.map((p) => { p.value}).includes(slug)) {
      const option = document.createElement("option");
      option.textContent = "--- Select a Player ---"
      option.selected = true;
      option.disabled = true;
      select.appendChild(option);
    }

    playerList.forEach(p => {
      const option = document.createElement("option");
      option.value = p.slug;
      option.textContent = p.player;
      if (slug === p.slug) {
        option.selected = true;
      }
      select.appendChild(option);
    });
  }

  select.addEventListener("change", (e) => {
    const url = new URL(window.location.href);
    url.searchParams.set("p", e.target.value);
    window.location.href = url;
  });

  async function load() {
    if (!slug) {
      showError("Make a selection above to view player records");
      return;
    }

    const url = `../data/players/${slug}.json`;
    try {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      playerData = await res.json();

      document.getElementById("title").textContent = playerData.player;
      document.getElementById("playerName").textContent = playerData.player;
      document.getElementById("eloPill").textContent = `Elo: ${safeNum(playerData.elo).toFixed(2)}`;
      document.getElementById("recordPill").textContent =
        `W-L-D: ${playerData.wins}-${playerData.losses}-${playerData.draws}`;
      const matchCount = Array.isArray(playerData.matches) ? playerData.matches.length : (playerData.games ?? 0);
      document.getElementById("gamesPill").textContent = `Matches: ${matchCount}`;

      allMatches = Array.isArray(playerData.matches) ? playerData.matches : [];
      // newest first
      allMatches.sort((a,b) => (String(b.week).localeCompare(String(a.week)) || (safeNum(b.round)-safeNum(a.round))));
      applyFilter();
      const media = document.getElementById("playerMedia");

      // Example: show a GIF for a specific player slug
      if (slug === "nathan-choi") {
        media.innerHTML = `
          <img
            src="../assets/gifs/nathan.gif"
            alt="Nathan GIF"
            style="max-width: 100%; border-radius: 12px; border: 1px solid #e6e8f0;"
          />
        `;
      }
      if (slug === "jarrod-haase") {
        media.innerHTML = `
          <img
            src="../assets/gifs/jarrod.gif"
            alt="Jarrod GIF"
            style="max-width: 100%; border-radius: 12px; border: 1px solid #e6e8f0;"
          />
        `;
      }
      if (slug === "timofey-tylik") {
        media.innerHTML = `
          <img
            src="../assets/imgs/timofey.jpg"
            alt="analyst.jpg"
            style="max-width: 100%; border-radius: 12px; border: 1px solid #e6e8f0;"
          />
        `;
      }
    } catch (e) {
      showError(`Could not load ${url}. (${e.message})`);
    }
  }

  load();
  loadPlayersIndex();
</script>
</body>
</html>
